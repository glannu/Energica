name: Keep Backend Awake

# Why this exists:
# The backend runs on Render's FREE plan, which puts the service to sleep after
# 15 minutes of no traffic. The first visitor after that has to wait 30s-2min+
# for a cold start before product data loads. This workflow pings the backend
# from GitHub's cloud every few minutes so it never sleeps. Free, 24/7, nothing
# to run on your own computer.

on:
  schedule:
    # Every 5 minutes. NOTE: GitHub often runs scheduled jobs a few minutes late,
    # so 5 (the minimum) is intentional to keep a safe margin under the 15-min sleep.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # also lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend until it responds
        run: |
          URL="https://energica-backend.onrender.com/api/products?limit=1"
          for i in 1 2 3 4 5; do
            echo "Attempt $i: pinging $URL"
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Backend is awake (HTTP 200)"
              exit 0
            fi
            echo "Got HTTP $code - backend may be waking up, retrying in 25s..."
            sleep 25
          done
          echo "Backend did not return HTTP 200 after retries"
          exit 1
