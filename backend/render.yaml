services:
  - type: web
    name: energica-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: energica_store
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@energicasolutions.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
